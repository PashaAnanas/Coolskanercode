<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Результаты</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .file { background: #e3f2fd; margin: 10px 0; padding: 15px; border-radius: 5px; }
        .line { background: #fff3e0; margin: 10px 0 10px 20px; padding: 10px; border-left: 3px solid orange; }
        .secret { background: #ffebee; margin: 5px 0 5px 40px; padding: 5px; color: #c62828; }
        .filename { font-size: 20px; font-weight: bold; color: #0d47a1; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Результаты поиска</h1>
        
        {% if data %}
            {% for file in data %}
            <div class="file">
                <div class="filename">📁 {{ file.filename }}</div>
                
                {% for line in file.lines %}
                <div class="line">
                    <div><strong>Строка {{ line.number }}:</strong></div>
                    <pre>{{ line.content }}</pre>
                    
                    {% for secret in line.secrets %}
                    <div class="secret">🔐 {{ secret }}</div>
                    {% endfor %}
                </div>
                {% endfor %}
            </div>
            {% endfor %}
        {% else %}
            <p style="text-align: center; color: #999; padding: 50px;">
                Нет данных. Запусти C++ программу!
            </p>
        {% endif %}
    </div>
    
    <script>
        setTimeout(() => location.reload(), 3000);
    </script>
</body>
</html>
