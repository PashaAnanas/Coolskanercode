<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КРУТОЙ СКАНЕР - Ввод</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 90%;
            max-width: 600px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #48bb78;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
        }
        
        .btn-info {
            background: #4299e1;
            color: white;
        }
        
        .btn-info:hover {
            background: #3182ce;
            transform: translateY(-2px);
        }
        
        .info-box {
            background: #f7fafc;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-top: 30px;
            border-radius: 10px;
        }
        
        .info-box h3 {
            color: #2d3748;
            margin-bottom: 10px;
        }
        
        .info-box ul {
            list-style: none;
            padding-left: 0;
        }
        
        .info-box li {
            margin: 10px 0;
            color: #4a5568;
            display: flex;
            align-items: center;
        }
        
        .info-box li:before {
            content: "🔍";
            margin-right: 10px;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 КРУТОЙ СКАНЕР</h1>
        <div class="subtitle">Поиск секретов в коде</div>
        
        <div class="input-group">
            <label for="path">Путь для сканирования:</label>
            <input type="text" id="path" placeholder="C:\\Projects\\myapp или C:\\file.txt">
        </div>
        
        <div class="btn-group">
            <button class="btn btn-primary" onclick="runScan()">🚀 Сканировать</button>
            <button class="btn btn-secondary" onclick="loadResults()">📂 Загрузить результаты</button>
            <button class="btn btn-info" onclick="viewStats()">📊 Статистика</button>
        </div>
        
        <div class="info-box">
            <h3>ℹ️ Как это работает:</h3>
            <ul>
                <li>Введи путь к папке или файлу</li>
                <li>C++ сканер найдет все секреты</li>
                <li>Результаты сохранятся в TXT, HTML и JSON</li>
                <li>Посмотри результаты в браузере</li>
            </ul>
        </div>
        
        <div class="footer">
            <p>КРУТОЙ СКАНЕР КОДА v2.0</p>
        </div>
    </div>
    
    <script>
        function runScan() {
            const path = document.getElementById('path').value;
            if (!path) {
                alert('Введите путь для сканирования!');
                return;
            }
            window.location.href = '/scan';
        }
        
        function loadResults() {
            window.location.href = '/load';
        }
        
        function viewStats() {
            window.location.href = '/stats';
        }
    </script>
</body>
</html>
