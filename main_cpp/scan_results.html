<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <title>Результаты поиска секретов</title>
    <style>
        body { font-family: 'Courier New', monospace; margin: 20px; background: #1e1e1e; color: #d4d4d4; }
        .container { max-width: 1200px; margin: 0 auto; background: #252526; padding: 20px; border-radius: 10px; }
        h1 { color: #569cd6; border-bottom: 2px solid #569cd6; padding-bottom: 10px; }
        .stats { background: #2d2d30; padding: 15px; border-radius: 5px; margin: 20px 0; border-left: 4px solid #569cd6; display: grid; grid-template-columns: repeat(2, 1fr); }
        .stat-item { text-align: center; }
        .stat-value { font-size: 2em; font-weight: bold; color: #4ec9b0; }
        .stat-label { color: #858585; }
        .file { background: #2d2d30; margin: 20px 0; padding: 15px; border-left: 4px solid #4ec9b0; border-radius: 5px; }
        .filename { font-size: 1.3em; font-weight: bold; color: #4ec9b0; margin-bottom: 10px; }
        .line { background: #1e1e1e; margin: 10px 0; padding: 10px; border: 1px solid #3e3e42; border-radius: 5px; }
        .line-number { color: #858585; margin-right: 10px; }
        .secret { margin: 5px 0 5px 20px; padding: 5px; border-left: 3px solid; background: #1e1e1e; }
        .search { border-left-color: #6a9955; }
        .entropy { border-left-color: #dcdcaa; }
        .keywords { border-left-color: #ce9178; }
        .footer { margin-top: 30px; text-align: center; color: #858585; }
    </style>
</head>
<body>
    <div class='container'>
        <h1> РЕЗУЛЬТАТЫ ПОИСКА СЕКРЕТОВ</h1>
        <div class='stats'>
            <div class='stat-item'><div class='stat-value'>0</div><div class='stat-label'> Файлов</div></div>
            <div class='stat-item'><div class='stat-value'>0</div><div class='stat-label'> Секретов</div></div>
        </div>
        <div class='footer'>
            ============================================================
            <p>Сгенерировано КРУТЫМ СКАНЕРОМ КОДА</p>
        </div>
    </div>
</body>
</html>
